<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v15</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ---------------- Firebase ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- 香港時間 ---------------- */

function getHKToday(){
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Hong_Kong"});
}
const today = getHKToday();

/* ---------------- 全域狀態 ---------------- */

const state = {
  tasks: [],
  habits: [],
  categories: ["工作","學習","運動","生活"]
};

let currentCategory = "全部";
let currentYear = new Date().toLocaleString("en-US",{timeZone:"Asia/Hong_Kong",year:"numeric"});
let currentMonth = new Date().toLocaleString("en-US",{timeZone:"Asia/Hong_Kong",month:"numeric"})-1;

/* ---------------- 載入資料 ---------------- */

function loadData(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });

  onSnapshot(collection(db,"habits"), snap=>{
    state.habits = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });
}

/* ---------------- 渲染入口 ---------------- */

function renderAll(){
  renderTasks();
  renderCalendar();
  renderCategoryUI();
}

/* ---------------- 任務 ---------------- */

window.addTask = async function(){
  const title=taskInput.value.trim();
  const note=taskNote.value.trim();
  const due=taskDue.value;
  const category=categorySelect.value;

  if(!title) return;

  await addDoc(collection(db,"tasks"),{
    title,note,dueDate:due,
    category,
    completed:false,
    pinned:false,
    order:Date.now(),
    created:serverTimestamp()
  });

  taskInput.value="";
  taskNote.value="";
  taskDue.value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed
  });
};

window.togglePin = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    pinned:!task.pinned
  });
};

window.deleteTask = async id=>{
  await deleteDoc(doc(db,"tasks",id));
};

window.saveNote = async function(id){
  const val=document.getElementById("note-"+id).value;
  await updateDoc(doc(db,"tasks",id),{note:val});
};

window.changeCategory = function(cat){
  currentCategory=cat;
  renderTasks();
};

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  const filtered = state.tasks
    .filter(t=>currentCategory==="全部"||t.category===currentCategory)
    .sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed-b.completed;
      if(a.pinned!==b.pinned) return b.pinned-a.pinned;
      return (a.order||0)-(b.order||0);
    });

  filtered.forEach(task=>{
    const overdue = task.dueDate && task.dueDate<today && !task.completed;

    container.innerHTML+=`
      <div class="card ${task.completed?"completed":""} ${task.pinned?"pinned":""}">
        <div class="task-row">
          <div>
            <input type="checkbox" ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>
            ${task.title}
            ${task.dueDate?`<span class="due ${overdue?"overdue":""}">📅 ${task.dueDate}</span>`:""}
          </div>
          <div>
            <button onclick='togglePin(${JSON.stringify(task)})'>📌</button>
            <button onclick="deleteTask('${task.id}')">❌</button>
          </div>
        </div>
        <textarea id="note-${task.id}" class="note-input"
          onchange="saveNote('${task.id}')">${task.note||""}</textarea>
      </div>
    `;
  });

  new Sortable(container,{
    animation:150,
    onEnd:async function(){
      const items=container.children;
      for(let i=0;i<items.length;i++){
        await updateDoc(doc(db,"tasks",items[i].dataset.id),{order:i});
      }
    }
  });
}

/* ---------------- 分類管理 ---------------- */

window.addCategory=function(){
  const val=newCategory.value.trim();
  if(!val) return;
  state.categories.push(val);
  newCategory.value="";
  renderCategoryUI();
};

window.deleteCategory=function(cat){
  state.categories=state.categories.filter(c=>c!==cat);
  renderCategoryUI();
};

function renderCategoryUI(){
  const catButtons=document.getElementById("categoryButtons");
  const select=document.getElementById("categorySelect");

  catButtons.innerHTML=`<button onclick="changeCategory('全部')">全部</button>`;
  select.innerHTML="";

  state.categories.forEach(cat=>{
    catButtons.innerHTML+=`
      <button onclick="changeCategory('${cat}')">${cat}</button>
      <button onclick="deleteCategory('${cat}')">❌</button>
    `;
    select.innerHTML+=`<option>${cat}</option>`;
  });
}

/* ---------------- 月曆 ---------------- */

window.changeMonth=function(offset){
  currentMonth+=offset;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  renderCalendar();
};

function renderCalendar(){
  const cal=document.getElementById("calendarContainer");
  const title=document.getElementById("calendarTitle");
  cal.innerHTML="";

  title.innerText=`${currentYear} 年 ${currentMonth+1} 月`;

  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=dateStr===today;
    cal.innerHTML+=`
      <div class="calendar-day ${isToday?"today":""}">
        ${d}
      </div>
    `;
  }
}

/* ---------------- 初始化 ---------------- */

loadData();
</script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;margin-bottom:60px;}
.card{background:white;padding:12px;margin:8px 0;border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,0.05);}
.task-row{display:flex;justify-content:space-between;align-items:center;}
.completed{text-decoration:line-through;color:#888;}
.pinned{border-left:4px solid #2563eb;}
.due{font-size:12px;margin-left:6px;color:#555;}
.overdue{color:red;font-weight:bold;}
.note-input{width:100%;min-height:50px;margin-top:6px;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.calendar-day{background:white;padding:10px;text-align:center;border-radius:8px;}
.today{background:#2563eb;color:white;font-weight:bold;}
button{cursor:pointer;margin:2px;}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px;display:flex;justify-content:space-around;border-top:1px solid #ddd;}
</style>
</head>

<body>

<h1>🌿 FocusLife</h1>
<div>細節成就卓越</div>

<h2>📝 任務</h2>

<div id="categoryButtons"></div>
<input id="newCategory" placeholder="新增分類">
<button onclick="addCategory()">新增分類</button>

<br><br>

<input id="taskInput" placeholder="任務名稱">
<input id="taskNote" placeholder="備註">
<input type="date" id="taskDue">
<select id="categorySelect"></select>
<button onclick="addTask()">新增任務</button>

<div id="tasksContainer"></div>

<h2>📅 月曆</h2>
<button onclick="changeMonth(-1)">⬅</button>
<span id="calendarTitle"></span>
<button onclick="changeMonth(1)">➡</button>
<div class="calendar" id="calendarContainer"></div>

</body>
</html>
