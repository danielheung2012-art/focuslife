<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife Online</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  where,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5",
  storageBucket: "focuslife-app-eeba5.firebasestorage.app",
  messagingSenderId: "158865821183",
  appId: "1:158865821183:web:f30ea26338e4af8d362bca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function todayString() {
  return new Date().toISOString().split("T")[0];
}

const today = todayString();

/* 新增任務 */
window.addTask = async function() {
  const input = document.getElementById("taskInput");
  const title = input.value.trim();
  if (!title) return;

  await addDoc(collection(db, "tasks"), {
    title: title,
    completed: false,
    date: today,
    created: serverTimestamp()
  });

  input.value = "";
};

/* 勾選完成 */
window.toggleTask = async function(id, currentStatus) {
  await updateDoc(doc(db, "tasks", id), {
    completed: !currentStatus
  });
};

/* 刪除任務 */
window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
};

/* 讀取今天任務 */
const q = query(
  collection(db, "tasks"),
  where("date", "==", today),
  orderBy("created")
);

onSnapshot(q, (snapshot) => {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  let total = 0;
  let completed = 0;

  snapshot.forEach((docItem) => {
    const data = docItem.data();
    total++;
    if (data.completed) completed++;

    const li = document.createElement("li");
    li.innerHTML = `
      <input type="checkbox" ${data.completed ? "checked" : ""} 
        onchange="toggleTask('${docItem.id}', ${data.completed})">
      <span style="text-decoration:${data.completed ? "line-through" : "none"}">
        ${data.title}
      </span>
      <button onclick="deleteTask('${docItem.id}')">❌</button>
    `;
    list.appendChild(li);
  });

  /* 更新完成率 */
  const rate = total === 0 ? 0 : Math.round((completed / total) * 100);
  document.getElementById("progressText").innerText =
    `完成率：${rate}% (${completed}/${total})`;

  document.getElementById("progressBar").style.width = rate + "%";
});
</script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f6f9;
}

input, button {
  padding: 8px;
  margin: 5px 0;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

li {
  margin: 8px 0;
}

.progress-container {
  width: 100%;
  background: #ddd;
  border-radius: 6px;
  margin: 10px 0;
}

.progress-bar {
  height: 20px;
  width: 0%;
  background: #22c55e;
  border-radius: 6px;
  transition: 0.3s;
}
</style>
</head>

<body>

<h2>🌿 FocusLife Online</h2>
<p>今日日期：<span id="todayDisplay"></span></p>

<input id="taskInput" placeholder="輸入今日任務">
<button onclick="addTask()">新增任務</button>

<h3 id="progressText">完成率：0%</h3>
<div class="progress-container">
  <div id="progressBar" class="progress-bar"></div>
</div>

<ul id="taskList"></ul>

<script>
document.getElementById("todayDisplay").innerText =
  new Date().toISOString().split("T")[0];
</script>

</body>
</html>
