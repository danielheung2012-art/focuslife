<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v16.2</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ---------- Firebase ---------- */

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------- 香港時間 ---------- */

function getHKToday(){
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Hong_Kong"});
}
const today = getHKToday();

/* ---------- State ---------- */

const state = {
  tasks: [],
  categories: ["工作","學習","運動","生活"]
};

let currentCategory = "全部";
let currentYear = new Date().toLocaleString("en-US",{timeZone:"Asia/Hong_Kong",year:"numeric"});
let currentMonth = new Date().toLocaleString("en-US",{timeZone:"Asia/Hong_Kong",month:"numeric"})-1;

/* ---------- Data ---------- */

function loadData(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTasks();
    renderCalendar();
  });
}

/* ---------- 任務 ---------- */

window.addTask = async function(title, dueDate){
  const taskTitle = title || document.getElementById("taskInput").value.trim();
  const taskDue = dueDate || document.getElementById("taskDue").value;
  const category = document.getElementById("categorySelect").value;

  if(!taskTitle) return;

  await addDoc(collection(db,"tasks"),{
    title:taskTitle,
    dueDate:taskDue || "",
    category:category,
    note:"",
    completed:false,
    order:Date.now(),
    created:serverTimestamp()
  });

  document.getElementById("taskInput").value="";
  closeCalendarModal();
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed
  });
};

window.deleteTask = async id=>{
  await deleteDoc(doc(db,"tasks",id));
};

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  const filtered = state.tasks
    .filter(t=>currentCategory==="全部"||t.category===currentCategory)
    .sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed-b.completed;
      return (a.order||0)-(b.order||0);
    });

  filtered.forEach(task=>{
    container.innerHTML+=`
      <div class="task-card ${task.completed?"completed":""}">
        <div class="task-row">
          <div>
            <input type="checkbox" ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>
            ${task.title}
            ${task.dueDate?`<span class="due">${task.dueDate}</span>`:""}
            ${task.category?`<span class="tag">${task.category}</span>`:""}
          </div>
          <button class="icon-btn delete" onclick="deleteTask('${task.id}')">✕</button>
        </div>
      </div>
    `;
  });
}

/* ---------- 分類 ---------- */

window.changeCategory=function(cat){
  currentCategory=cat;
  renderTasks();
};

/* ---------- 月曆 ---------- */

window.changeMonth=function(offset){
  currentMonth+=offset;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  renderCalendar();
};

function renderCalendar(){
  const cal=document.getElementById("calendarContainer");
  const title=document.getElementById("calendarTitle");
  cal.innerHTML="";

  title.innerText=`${currentYear} 年 ${currentMonth+1} 月`;

  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();

  const weekdays=["日","一","二","三","四","五","六"];

  weekdays.forEach(d=>{
    cal.innerHTML+=`<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=dateStr===today;

    cal.innerHTML+=`
      <div class="calendar-day ${isToday?"today":""}"
        onclick="openCalendarModal('${dateStr}')">
        <div>${d}</div>
        <div class="weekday-small">${weekdays[new Date(currentYear,currentMonth,d).getDay()]}</div>
      </div>
    `;
  }
}

/* ---------- 月曆浮層 ---------- */

window.openCalendarModal=function(date){
  document.getElementById("modalDate").innerText=date;
  document.getElementById("calendarModal").style.display="flex";
};

window.closeCalendarModal=function(){
  document.getElementById("calendarModal").style.display="none";
};

window.addFromCalendar=function(){
  const title=document.getElementById("modalInput").value.trim();
  const date=document.getElementById("modalDate").innerText;
  addTask(title,date);
  document.getElementById("modalInput").value="";
};

/* ---------- Init ---------- */

loadData();
</script>

<style>
body{font-family:Arial;background:#f6f7f9;padding:20px;}
.quote{text-align:center;font-size:24px;margin:40px 0;color:#444;}
.task-card{background:white;padding:14px;margin:10px 0;border-radius:12px;}
.task-row{display:flex;justify-content:space-between;}
.completed{text-decoration:line-through;color:#aaa;}
.due{font-size:12px;color:#777;margin-left:6px;}
.tag{background:#e8f0ff;color:#2563eb;padding:2px 6px;border-radius:6px;font-size:12px;margin-left:6px;}
.icon-btn{background:none;border:none;font-size:13px;opacity:0.5;cursor:pointer;}
.icon-btn:hover{opacity:1;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;}
.weekday{text-align:center;font-size:12px;color:#666;}
.calendar-day{background:white;padding:10px;border-radius:10px;text-align:center;cursor:pointer;}
.today{background:#2563eb;color:white;}
.weekday-small{font-size:10px;color:#888;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);display:none;justify-content:center;align-items:center;}
.modal-box{background:white;padding:20px;border-radius:12px;width:260px;}
</style>
</head>

<body>

<div class="quote">細節成就卓越</div>

<h3>分類</h3>
<button onclick="changeCategory('全部')">全部</button>
<button onclick="changeCategory('工作')">工作</button>
<button onclick="changeCategory('學習')">學習</button>
<button onclick="changeCategory('運動')">運動</button>
<button onclick="changeCategory('生活')">生活</button>

<h3>新增任務</h3>
<input id="taskInput" placeholder="任務名稱">
<input type="date" id="taskDue">
<select id="categorySelect">
  <option>工作</option>
  <option>學習</option>
  <option>運動</option>
  <option>生活</option>
</select>
<button onclick="addTask()">新增</button>

<div id="tasksContainer"></div>

<h3>📅 月曆</h3>
<button onclick="changeMonth(-1)">‹</button>
<span id="calendarTitle"></span>
<button onclick="changeMonth(1)">›</button>
<div class="calendar" id="calendarContainer"></div>

<div id="calendarModal" class="modal">
  <div class="modal-box">
    <div id="modalDate"></div>
    <input id="modalInput" placeholder="輸入任務">
    <button onclick="addFromCalendar()">新增</button>
    <button onclick="closeCalendarModal()">取消</button>
  </div>
</div>

</body>
</html>
