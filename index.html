<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v11.3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allTasks = [];
let allHabits = [];

/* ---------------- 任務系統 ---------------- */

window.addTask = async function(){
  const title = document.getElementById("taskInput").value.trim();
  const note = document.getElementById("taskNote").value.trim();
  const category = document.getElementById("categorySelect").value;

  if(!title) return;

  await addDoc(collection(db,"tasks"),{
    title,
    note,
    category,
    completed:false,
    created:serverTimestamp()
  });

  document.getElementById("taskInput").value="";
  document.getElementById("taskNote").value="";
};

window.toggleTask = async(id,current)=>{
  await updateDoc(doc(db,"tasks",id),{completed:!current});
};

function loadTasks(){
  const q=query(collection(db,"tasks"),orderBy("created"));
  onSnapshot(q,(snapshot)=>{
    allTasks=[];
    snapshot.forEach(docItem=>{
      allTasks.push({id:docItem.id,...docItem.data()});
    });
    renderTasks();
  });
}

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  allTasks.forEach(task=>{
    const div=document.createElement("div");
    div.className="task-card";

    div.innerHTML=`
      <div>
        <input type="checkbox" ${task.completed?"checked":""}
          onchange="toggleTask('${task.id}',${task.completed})">
        ${task.title}
        <button onclick="toggleNote('${task.id}')">📝</button>
      </div>
      <div id="note-${task.id}" style="display:none;font-size:12px;color:#555;">
        ${task.note||"無備註"}
      </div>
    `;

    container.appendChild(div);
  });
}

window.toggleNote=function(id){
  const el=document.getElementById("note-"+id);
  el.style.display=el.style.display==="none"?"block":"none";
};

/* ---------------- 習慣系統 ---------------- */

window.addHabit = async function(){
  const title=document.getElementById("habitInput").value.trim();
  const repeatType=document.getElementById("repeatSelect").value;

  if(!title) return;

  await addDoc(collection(db,"habits"),{
    title,
    repeatType,
    streak:0,
    lastCompletedDate:null,
    createdAt:serverTimestamp()
  });

  document.getElementById("habitInput").value="";
};

async function completeHabit(habit){
  const today=new Date().toISOString().split("T")[0];

  if(habit.lastCompletedDate===today) return;

  let newStreak=habit.streak||0;

  const yesterday=new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.toISOString().split("T")[0];

  if(habit.lastCompletedDate===yStr){
    newStreak+=1;
  }else{
    newStreak=1;
  }

  await updateDoc(doc(db,"habits",habit.id),{
    streak:newStreak,
    lastCompletedDate:today
  });

  await addDoc(collection(db,"habit_logs"),{
    habitId:habit.id,
    date:today,
    completed:true
  });
}

function loadHabits(){
  const q=query(collection(db,"habits"),orderBy("createdAt"));
  onSnapshot(q,(snapshot)=>{
    allHabits=[];
    snapshot.forEach(docItem=>{
      allHabits.push({id:docItem.id,...docItem.data()});
    });
    renderHabits();
    renderHabitChart();
  });
}

function renderHabits(){
  const container=document.getElementById("habitContainer");
  container.innerHTML="";

  allHabits.forEach(habit=>{
    const div=document.createElement("div");
    div.className="habit-card";
    div.innerHTML=`
      ${habit.title}
      🔥 ${habit.streak||0} 天
      <button onclick='completeHabit(${JSON.stringify(habit)})'>✅</button>
    `;
    container.appendChild(div);
  });
}

/* ---------------- 趨勢圖 ---------------- */

async function renderHabitChart(){
  const snapshot=await getDocs(collection(db,"habit_logs"));
  const logs=snapshot.docs.map(d=>d.data());

  const last7=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(d.getDate()-i);
    last7.push(d.toISOString().split("T")[0]);
  }

  const counts=last7.map(date=>{
    return logs.filter(l=>l.date===date).length;
  });

  const ctx=document.getElementById("habitChart");
  new Chart(ctx,{
    type:"bar",
    data:{
      labels:last7,
      datasets:[{
        label:"每日完成習慣數",
        data:counts
      }]
    }
  });
}

loadTasks();
loadHabits();

</script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.task-card,.habit-card{
  background:white;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
button{margin-left:6px;}
</style>
</head>

<body>

<h1>🌿 FocusLife v11.3</h1>

<h2>📝 任務</h2>
<input id="taskInput" placeholder="任務名稱">
<input id="taskNote" placeholder="備註">
<select id="categorySelect">
  <option>工作</option>
  <option>學習</option>
  <option>運動</option>
  <option>生活</option>
  <option>嗜好小組</option>
</select>
<button onclick="addTask()">新增任務</button>

<div id="tasksContainer"></div>

<hr>

<h2>🔥 習慣</h2>
<input id="habitInput" placeholder="習慣名稱">
<select id="repeatSelect">
  <option value="daily">每日</option>
  <option value="weekly">每週</option>
</select>
<button onclick="addHabit()">新增習慣</button>

<div id="habitContainer"></div>

<h3>📊 最近7天完成趨勢</h3>
<canvas id="habitChart"></canvas>

</body>
</html>
