<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v17.5</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const state = { tasks: [], categories: [] };
let currentCategory = "全部";

/* ---------- 分類 ---------- */

function loadCategories(){
  onSnapshot(collection(db,"categories"), snap=>{
    state.categories = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCategoryUI();
  });
}

window.addCategory = async function(){
  const val=document.getElementById("newCategory").value.trim();
  if(!val) return;

  await addDoc(collection(db,"categories"),{
    name:val,
    created:serverTimestamp()
  });

  document.getElementById("newCategory").value="";
};

window.deleteCategory = async function(id,name){

  const tasksSnap = await getDocs(collection(db,"tasks"));
  for(const t of tasksSnap.docs){
    if(t.data().category===name){
      await updateDoc(doc(db,"tasks",t.id),{
        category:"未分類"
      });
    }
  }

  await deleteDoc(doc(db,"categories",id));

  if(currentCategory===name){
    currentCategory="全部";
  }
};

window.changeCategory=function(cat){
  currentCategory=cat;
  renderTasks();
  renderCategoryUI();
};

let longPressTimer = null;
let activeDelete = null;

function renderCategoryUI(){
  const container=document.getElementById("categoryScroll");
  const sel=document.getElementById("categorySelect");

  container.innerHTML="";
  sel.innerHTML=`<option>未分類</option>`;

  function createCat(name,id){
    const div=document.createElement("div");
    div.className="cat-item"+(currentCategory===name?" active":"");
    div.innerHTML=`<span>${name}</span><span class="delete-btn">✕</span>`;

    const del=div.querySelector(".delete-btn");
    del.style.display="none";

    div.onclick=()=>changeCategory(name);

    div.addEventListener("touchstart",()=>{
      longPressTimer=setTimeout(()=>{
        if(activeDelete) activeDelete.style.display="none";
        del.style.display="inline";
        activeDelete=del;
      },800);
    });

    div.addEventListener("touchend",()=>{
      clearTimeout(longPressTimer);
    });

    del.onclick=(e)=>{
      e.stopPropagation();
      deleteCategory(id,name);
    };

    container.appendChild(div);
  }

  createCat("全部");
  createCat("未分類");

  state.categories.forEach(cat=>{
    createCat(cat.name,cat.id);
    sel.innerHTML+=`<option>${cat.name}</option>`;
  });

  document.body.onclick=()=>{
    if(activeDelete){
      activeDelete.style.display="none";
      activeDelete=null;
    }
  };
}

/* ---------- 任務 ---------- */

function loadTasks(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTasks();
  });
}

window.addTask = async function(){
  const title=document.getElementById("taskInput").value.trim();
  const due=document.getElementById("taskDue").value;
  const category=document.getElementById("categorySelect").value;
  const priority=document.getElementById("prioritySelect").value;

  if(!title) return;

  await addDoc(collection(db,"tasks"),{
    title,
    dueDate:due||"",
    category:category||"未分類",
    priority:priority||"中",
    note:"",
    completed:false,
    order:Date.now(),
    created:serverTimestamp()
  });

  document.getElementById("taskInput").value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed
  });
};

window.deleteTask = async id=>{
  await deleteDoc(doc(db,"tasks",id));
};

function priorityClass(p){
  if(p==="高") return "p-high";
  if(p==="中") return "p-mid";
  return "p-low";
}

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  const filtered = state.tasks
    .filter(t=>currentCategory==="全部"||t.category===currentCategory)
    .sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed-b.completed;
      return (a.order||0)-(b.order||0);
    });

  filtered.forEach(task=>{
    container.innerHTML+=`
      <div class="task-card ${task.completed?"completed":""}" data-id="${task.id}">
        <div class="task-row">
          <div>
            <input type="checkbox" ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>
            ${task.title}
            ${task.priority?`<span class="priority ${priorityClass(task.priority)}">${task.priority}</span>`:""}
          </div>
          <div>
            <button class="icon-btn" onclick="deleteTask('${task.id}')">✕</button>
          </div>
        </div>
      </div>
    `;
  });

  new Sortable(container,{
    animation:150,
    onEnd:async function(){
      const items=container.children;
      for(let i=0;i<items.length;i++){
        await updateDoc(doc(db,"tasks",items[i].dataset.id),{order:i});
      }
    }
  });
}

/* ---------- 初始化 ---------- */

loadCategories();
loadTasks();

</script>

<style>
body{font-family:Arial;background:#f6f7f9;padding:20px;}

.category-scroll{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding-bottom:6px;
  margin-bottom:10px;
}

.cat-item{
  flex:0 0 auto;
  padding:6px 14px;
  background:#e5e7eb;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:6px;
}

.cat-item.active{
  background:#2563eb;
  color:white;
}

.delete-btn{
  font-size:12px;
  color:#dc2626;
}

.task-card{background:white;padding:14px;margin:10px 0;border-radius:12px;}
.task-row{display:flex;justify-content:space-between;align-items:center;}
.completed{text-decoration:line-through;color:#aaa;}

.priority{
  padding:2px 8px;
  border-radius:12px;
  font-size:12px;
  margin-left:8px;
}

.p-high{background:#fee2e2;color:#b91c1c;}
.p-mid{background:#ffedd5;color:#c2410c;}
.p-low{background:#e5e7eb;color:#374151;}

.icon-btn{background:none;border:none;font-size:14px;cursor:pointer;}
</style>
</head>

<body>

<h3>分類</h3>
<div class="category-scroll" id="categoryScroll"></div>

<input id="newCategory" placeholder="新增分類">
<button onclick="addCategory()">新增分類</button>

<h3>新增任務</h3>
<input id="taskInput" placeholder="任務名稱">
<input type="date" id="taskDue">

<select id="categorySelect"></select>

<select id="prioritySelect">
  <option value="高">高</option>
  <option value="中" selected>中</option>
  <option value="低">低</option>
</select>

<button onclick="addTask()">新增</button>

<div id="tasksContainer"></div>

</body>
</html>
