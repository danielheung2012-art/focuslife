<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v17.4</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getHKToday(){
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Hong_Kong"});
}
const today = getHKToday();

const state = {
  tasks: [],
  categories: []
};

let currentCategory = "全部";
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

/* ---------- 分類 ---------- */

function loadCategories(){
  onSnapshot(collection(db,"categories"), snap=>{
    state.categories = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCategoryUI();
  });
}

window.addCategory = async function(){
  const val=document.getElementById("newCategory").value.trim();
  if(!val) return;

  await addDoc(collection(db,"categories"),{
    name:val,
    created:serverTimestamp()
  });

  document.getElementById("newCategory").value="";
};

window.deleteCategory = async function(id,name){

  // 將任務改為未分類
  const tasksSnap = await getDocs(collection(db,"tasks"));
  for(const t of tasksSnap.docs){
    if(t.data().category===name){
      await updateDoc(doc(db,"tasks",t.id),{
        category:"未分類"
      });
    }
  }

  await deleteDoc(doc(db,"categories",id));

  if(currentCategory===name){
    currentCategory="全部";
  }
};

window.changeCategory=function(cat){
  currentCategory=cat;
  renderTasks();
  renderCategoryUI();
};

function renderCategoryUI(){
  const container=document.getElementById("categoryScroll");
  const sel=document.getElementById("categorySelect");

  container.innerHTML="";
  sel.innerHTML=`<option>未分類</option>`;

  // 全部
  container.innerHTML+=`
    <div class="cat-item ${currentCategory==="全部"?"active":""}"
      onclick="changeCategory('全部')">全部</div>
  `;

  // 未分類
  container.innerHTML+=`
    <div class="cat-item ${currentCategory==="未分類"?"active":""}"
      onclick="changeCategory('未分類')">未分類</div>
  `;

  state.categories.forEach(cat=>{
    container.innerHTML+=`
      <div class="cat-item ${currentCategory===cat.name?"active":""}">
        <span onclick="changeCategory('${cat.name}')">${cat.name}</span>
        <span class="delete-btn"
          onclick="deleteCategory('${cat.id}','${cat.name}')">✕</span>
      </div>
    `;
    sel.innerHTML+=`<option>${cat.name}</option>`;
  });
}

/* ---------- 任務 ---------- */

function loadTasks(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTasks();
    renderCalendar();
  });
}

window.addTask = async function(title,dueDate){
  const taskTitle = title || document.getElementById("taskInput").value.trim();
  const taskDue = dueDate || document.getElementById("taskDue").value;
  const category = document.getElementById("categorySelect").value;

  if(!taskTitle) return;

  await addDoc(collection(db,"tasks"),{
    title:taskTitle,
    dueDate:taskDue||"",
    category:category||"未分類",
    note:"",
    completed:false,
    order:Date.now(),
    created:serverTimestamp()
  });

  document.getElementById("taskInput").value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed
  });
};

window.deleteTask = async id=>{
  await deleteDoc(doc(db,"tasks",id));
};

window.saveNote = async function(id){
  const val=document.getElementById("note-"+id).value;
  await updateDoc(doc(db,"tasks",id),{note:val});
};

window.toggleNote=function(id){
  const el=document.getElementById("note-box-"+id);
  el.style.display = el.style.display==="block"?"none":"block";
};

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  const filtered = state.tasks
    .filter(t=>currentCategory==="全部"||t.category===currentCategory)
    .sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed-b.completed;
      return (a.order||0)-(b.order||0);
    });

  filtered.forEach(task=>{
    container.innerHTML+=`
      <div class="task-card ${task.completed?"completed":""}" data-id="${task.id}">
        <div class="task-row">
          <div>
            <input type="checkbox" ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>
            ${task.title}
            ${task.dueDate?`<span class="due">${task.dueDate}</span>`:""}
            ${task.category?`<span class="tag">${task.category}</span>`:""}
          </div>
          <div>
            <button class="icon-btn" onclick="toggleNote('${task.id}')">📝</button>
            <button class="icon-btn delete" onclick="deleteTask('${task.id}')">✕</button>
          </div>
        </div>
        <div id="note-box-${task.id}" class="note-box" style="display:none;">
          <textarea id="note-${task.id}" onchange="saveNote('${task.id}')">${task.note||""}</textarea>
        </div>
      </div>
    `;
  });

  new Sortable(container,{
    animation:150,
    onEnd:async function(){
      const items=container.children;
      for(let i=0;i<items.length;i++){
        await updateDoc(doc(db,"tasks",items[i].dataset.id),{order:i});
      }
    }
  });
}

/* ---------- 初始化 ---------- */

loadCategories();
loadTasks();

</script>

<style>
body{font-family:Arial;background:#f6f7f9;padding:20px;}

.category-scroll{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding-bottom:6px;
  margin-bottom:10px;
}

.cat-item{
  flex:0 0 auto;
  padding:6px 14px;
  background:#e5e7eb;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:6px;
}

.cat-item.active{
  background:#2563eb;
  color:white;
}

.delete-btn{
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

.task-card{background:white;padding:14px;margin:10px 0;border-radius:12px;}
.task-row{display:flex;justify-content:space-between;}
.completed{text-decoration:line-through;color:#aaa;}
.due{font-size:12px;color:#777;margin-left:6px;}
.tag{background:#e8f0ff;color:#2563eb;padding:2px 6px;border-radius:6px;font-size:12px;margin-left:6px;}
.icon-btn{background:none;border:none;font-size:14px;cursor:pointer;opacity:0.6;}
.icon-btn:hover{opacity:1;}
.note-box textarea{width:100%;margin-top:6px;background:#f2f2f2;border:none;padding:6px;border-radius:8px;}
</style>
</head>

<body>

<h3>分類</h3>
<div class="category-scroll" id="categoryScroll"></div>

<input id="newCategory" placeholder="新增分類">
<button onclick="addCategory()">新增分類</button>

<h3>新增任務</h3>
<input id="taskInput" placeholder="任務名稱">
<input type="date" id="taskDue">
<select id="categorySelect"></select>
<button onclick="addTask()">新增</button>

<div id="tasksContainer"></div>

</body>
</html>
