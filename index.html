<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife Online</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5",
  storageBucket: "focuslife-app-eeba5.firebasestorage.app",
  messagingSenderId: "158865821183",
  appId: "1:158865821183:web:f30ea26338e4af8d362bca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 新增任務 */
window.addTask = async function() {
  const input = document.getElementById("taskInput");
  const title = input.value.trim();
  if (!title) return;

  await addDoc(collection(db, "tasks"), {
    title: title,
    completed: false,
    created: serverTimestamp()
  });

  input.value = "";
};

/* 勾選完成 */
window.toggleTask = async function(id, currentStatus) {
  await updateDoc(doc(db, "tasks", id), {
    completed: !currentStatus
  });
};

/* 刪除任務 */
window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
};

/* 即時同步 */
const q = query(collection(db, "tasks"), orderBy("created"));

onSnapshot(q, (snapshot) => {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();
    const li = document.createElement("li");

    li.innerHTML = `
      <input type="checkbox" ${data.completed ? "checked" : ""} 
        onchange="toggleTask('${docItem.id}', ${data.completed})">
      <span style="text-decoration:${data.completed ? "line-through" : "none"}">
        ${data.title}
      </span>
      <button onclick="deleteTask('${docItem.id}')">❌</button>
    `;

    list.appendChild(li);
  });
});
</script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f6f9;
}

input[type="text"], button {
  padding: 8px;
  margin: 5px 0;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

li {
  margin: 8px 0;
}
</style>
</head>

<body>

<h2>🌿 FocusLife Online</h2>

<input id="taskInput" placeholder="輸入任務">
<button onclick="addTask()">新增任務</button>

<ul id="taskList"></ul>

</body>
</html>
