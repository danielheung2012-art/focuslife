<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v18.3</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =============================
   Firebase Config
============================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =============================
   State
============================= */

const state = {
  tasks: [],
  inbox: []
};

const PRIORITY_WEIGHT = { 高:3, 中:2, 低:1 };
const STAGNANT_DAYS = 3;

/* =============================
   Load
============================= */

function loadTasks(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({
      id:d.id,
      ...d.data()
    }));
    renderAll();
  });
}

function loadInbox(){
  onSnapshot(collection(db,"inbox"), snap=>{
    state.inbox = snap.docs.map(d=>({
      id:d.id,
      ...d.data()
    }));
    renderAll();
  });
}

/* =============================
   Task Operations
============================= */

window.addTask = async function(){
  const input = document.getElementById("taskInput");
  const title = input.value.trim();
  if(!title) return;

  const priority = document.getElementById("prioritySelect").value;

  await addDoc(collection(db,"tasks"),{
    title,
    category:"未分類",
    priority,
    completed:false,
    nextStep:"",
    isFocusManual:false,
    createdAt:Date.now(),
    updatedAt:null
  });

  input.value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed,
    updatedAt:Date.now()
  });
};

window.toggleFocusManual = async function(task){

  const manualCount = state.tasks.filter(t=>
    t.isFocusManual && !t.completed
  ).length;

  if(!task.isFocusManual && manualCount >= 3){
    return;
  }

  await updateDoc(doc(db,"tasks",task.id),{
    isFocusManual:!task.isFocusManual,
    updatedAt:Date.now()
  });
};

window.updateNextStep = async function(id,value){
  await updateDoc(doc(db,"tasks",id),{
    nextStep:value,
    updatedAt:Date.now()
  });
};

/* =============================
   Inbox Operations
============================= */

window.addInbox = async function(){
  const input = document.getElementById("inboxInput");
  const content = input.value.trim();
  if(!content) return;

  await addDoc(collection(db,"inbox"),{
    content,
    createdAt:Date.now()
  });

  input.value="";
};

window.convertInbox = async function(item){

  await addDoc(collection(db,"tasks"),{
    title:item.content,
    category:"未分類",
    priority:"中",
    completed:false,
    nextStep:"",
    isFocusManual:false,
    createdAt:Date.now(),
    updatedAt:null
  });

  await deleteDoc(doc(db,"inbox",item.id));
};

window.deleteInbox = async function(id){
  await deleteDoc(doc(db,"inbox",id));
};

/* =============================
   Derived Focus
============================= */

function getFocusTasks(){

  const manual = state.tasks.filter(t=>
    !t.completed && t.isFocusManual
  );

  const auto = state.tasks
    .filter(t=>
      !t.completed && !t.isFocusManual
    )
    .sort((a,b)=>{
      if(PRIORITY_WEIGHT[a.priority] !== PRIORITY_WEIGHT[b.priority]){
        return PRIORITY_WEIGHT[b.priority] - PRIORITY_WEIGHT[a.priority];
      }
      return (a.createdAt||0)-(b.createdAt||0);
    });

  return [
    ...manual,
    ...auto.slice(0,3-manual.length)
  ].slice(0,3);
}

/* =============================
   Render
============================= */

function renderFocus(){
  const container = document.getElementById("focusContainer");
  container.innerHTML="";

  const focusTasks = getFocusTasks();

  if(focusTasks.length===0){
    container.innerHTML="<div class='empty'>今日沒有焦點</div>";
    return;
  }

  focusTasks.forEach(task=>{
    container.innerHTML+=`
      <div class="focus-item">
        <span>${task.title}</span>
      </div>
    `;
  });
}

function renderInbox(){
  const container = document.getElementById("inboxContainer");
  container.innerHTML="";

  if(state.inbox.length===0){
    container.innerHTML="<div class='empty'>目前沒有靈感</div>";
    return;
  }

  state.inbox
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))
    .forEach(item=>{
      container.innerHTML+=`
        <div class="inbox-item">
          <span>${item.content}</span>
          <div class="inbox-actions">
            <button onclick='convertInbox(${JSON.stringify(item)})'>加入</button>
            <button onclick='deleteInbox("${item.id}")'>刪除</button>
          </div>
        </div>
      `;
    });
}

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  state.tasks
    .sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed-b.completed;
      return (a.createdAt||0)-(b.createdAt||0);
    })
    .forEach(task=>{

      const isStalled = !task.completed &&
        (Date.now() - (task.updatedAt||task.createdAt||0))
        > STAGNANT_DAYS*24*60*60*1000;

      container.innerHTML+=`
        <div class="task-item ${task.completed?"done":""}">
          <div class="task-top">
            <input type="checkbox"
              ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>

            <span class="task-title">${task.title}</span>

            <span onclick='toggleFocusManual(${JSON.stringify(task)})'
              class="star">
              ${task.isFocusManual?"★":"☆"}
            </span>
          </div>

          <input class="next-input"
            value="${task.nextStep||""}"
            placeholder="下一步..."
            onblur="updateNextStep('${task.id}',this.value)">

          ${isStalled?"<div class='stalled'>建議補上下一步</div>":""}
        </div>
      `;
    });
}

function renderAll(){
  renderFocus();
  renderInbox();
  renderTasks();
}

/* =============================
   Init
============================= */

loadTasks();
loadInbox();

</script>

<style>

/* ===== Base ===== */

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#fafafa;
  max-width:680px;
  margin:auto;
  padding:40px 20px;
  color:#111;
}

h3{
  font-size:14px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:12px;
  color:#888;
}

input, select{
  padding:10px 12px;
  border:1px solid #e5e5e5;
  border-radius:8px;
  font-size:14px;
  outline:none;
}

input:focus{
  border-color:#999;
}

button{
  border:none;
  background:none;
  cursor:pointer;
  font-size:13px;
  color:#666;
}

button:hover{
  color:#000;
}

.empty{
  color:#aaa;
  font-size:13px;
  padding:10px 0;
}

/* ===== Sections ===== */

.section{
  margin-bottom:40px;
}

/* ===== Focus ===== */

.focus-item{
  padding:10px 14px;
  background:white;
  border:1px solid #eee;
  border-radius:10px;
  margin-bottom:8px;
}

/* ===== Inbox ===== */

.inbox-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  background:white;
  border:1px solid #eee;
  border-radius:10px;
  margin-bottom:8px;
}

.inbox-actions button{
  margin-left:10px;
}

/* ===== Tasks ===== */

.task-item{
  background:white;
  border:1px solid #eee;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

.task-item.done{
  opacity:0.5;
}

.task-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.task-title{
  flex:1;
}

.star{
  cursor:pointer;
  font-size:16px;
  color:#999;
}

.star:hover{
  color:#000;
}

.next-input{
  width:100%;
  margin-top:10px;
}

.stalled{
  margin-top:6px;
  font-size:12px;
  color:#c98c00;
}

</style>
</head>

<body>

<div class="section">
  <h3>今日焦點</h3>
  <div id="focusContainer"></div>
</div>

<div class="section">
  <h3>InBox</h3>
  <input id="inboxInput"
    placeholder="快速記錄靈感..."
    onkeypress="if(event.key==='Enter') addInbox()">
  <div id="inboxContainer"></div>
</div>

<div class="section">
  <h3>任務</h3>
  <div style="display:flex; gap:10px; margin-bottom:12px;">
    <input id="taskInput"
      placeholder="新增任務..."
      onkeypress="if(event.key==='Enter') addTask()">
    <select id="prioritySelect">
      <option value="高">高</option>
      <option value="中" selected>中</option>
      <option value="低">低</option>
    </select>
  </div>
  <div id="tasksContainer"></div>
</div>

</body>
</html>
