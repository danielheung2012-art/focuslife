<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife Stable</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories = [];
let unsubscribeTasks = null;

/* ✅ 載入分類 */
async function loadCategories() {
  const snapshot = await getDocs(collection(db, "categories"));
  categories = snapshot.docs.map(doc => doc.data().name);

  if (categories.length === 0) {
    categories = ["工作", "學習", "運動", "生活", "嗜好小組"];
    for (let cat of categories) {
      await addDoc(collection(db, "categories"), { name: cat });
    }
  }

  renderCategoryOptions();
}

/* ✅ 顯示分類下拉 */
function renderCategoryOptions() {
  const select = document.getElementById("categorySelect");
  select.innerHTML = "";
  categories.forEach(cat => {
    select.innerHTML += `<option>${cat}</option>`;
  });
}

/* ✅ 新增分類 */
window.addCategory = async function() {
  const name = prompt("輸入新分類名稱");
  if (!name) return;
  await addDoc(collection(db, "categories"), { name });
  await loadCategories();
};

/* ✅ 新增任務 */
window.addTask = async function() {
  const title = document.getElementById("taskInput").value.trim();
  const category = document.getElementById("categorySelect").value;
  if (!title) return;

  await addDoc(collection(db, "tasks"), {
    title,
    category,
    completed: false,
    pinned: false,
    created: serverTimestamp()
  });

  document.getElementById("taskInput").value = "";
};

/* ✅ 切換完成 */
window.toggleTask = async function(id, current) {
  await updateDoc(doc(db, "tasks", id), {
    completed: !current
  });
};

/* ✅ 刪除 */
window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
};

/* ✅ 置頂 */
window.togglePin = async function(id, current) {
  await updateDoc(doc(db, "tasks", id), {
    pinned: !current
  });
};

/* ✅ 載入任務（穩定版） */
function loadTasks() {
  const q = query(collection(db, "tasks"), orderBy("created"));

  unsubscribeTasks = onSnapshot(q, (snapshot) => {
    const container = document.getElementById("taskContainer");
    container.innerHTML = "";

    const grouped = {};
    categories.forEach(cat => grouped[cat] = []);

    snapshot.forEach(docItem => {
      const data = docItem.data();

      if (!grouped[data.category]) {
        grouped[data.category] = [];
      }

      grouped[data.category].push({
        id: docItem.id,
        ...data
      });
    });

    for (let cat of categories) {
      if (!grouped[cat] || grouped[cat].length === 0) continue;

      const section = document.createElement("div");
      section.innerHTML = `<h3>📂 ${cat}</h3>`;
      const ul = document.createElement("ul");

      /* ✅ 前端排序：pinned 在前 */
      grouped[cat]
        .sort((a, b) => (b.pinned === true) - (a.pinned === true))
        .forEach(task => {
          const li = document.createElement("li");
          li.innerHTML = `
            <input type="checkbox" ${task.completed ? "checked" : ""}
              onchange="toggleTask('${task.id}', ${task.completed})">
            <span style="text-decoration:${task.completed ? "line-through" : "none"}">
              ${task.title}
            </span>
            <button onclick="togglePin('${task.id}', ${task.pinned})">
              ${task.pinned ? "📌" : "📍"}
            </button>
            <button onclick="deleteTask('${task.id}')">❌</button>
          `;
          ul.appendChild(li);
        });

      section.appendChild(ul);
      container.appendChild(section);
    }
  });
}

/* ✅ 初始化 */
async function init() {
  await loadCategories();
  loadTasks();
}

init();

</script>

<style>
body { font-family: Arial; padding: 20px; background: #f4f6f9; }
input, select, button { padding: 8px; margin: 5px 0; }
button { background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
li { margin: 6px 0; }
h3 { margin-top: 20px; }
</style>
</head>

<body>

<h2>🌿 FocusLife Stable</h2>

<h3>新增任務</h3>
<input id="taskInput" placeholder="輸入任務">
<select id="categorySelect"></select>
<button onclick="addTask()">新增任務</button>
<button onclick="addCategory()">➕ 新增分類</button>

<hr>

<h2>📋 任務清單</h2>
<div id="taskContainer"></div>

</body>
</html>
