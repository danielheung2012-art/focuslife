<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v18.2</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =============================
   Firebase Config
============================= */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =============================
   Global State
============================= */

const state = {
  tasks: [],
  inbox: []
};

const PRIORITY_WEIGHT = { 高:3, 中:2, 低:1 };
const STAGNANT_DAYS = 3;

/* =============================
   Load Data
============================= */

function loadTasks(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({
      id:d.id,
      ...d.data()
    }));
    renderAll();
  });
}

function loadInbox(){
  onSnapshot(collection(db,"inbox"), snap=>{
    state.inbox = snap.docs.map(d=>({
      id:d.id,
      ...d.data()
    }));
    renderAll();
  });
}

/* =============================
   Task Operations
============================= */

window.addTask = async function(){
  const title = document.getElementById("taskInput").value.trim();
  if(!title) return;

  const priority = document.getElementById("prioritySelect").value;

  await addDoc(collection(db,"tasks"),{
    title,
    category:"未分類",
    priority,
    completed:false,
    nextStep:"",
    isFocusManual:false,
    createdAt:Date.now(),
    updatedAt:null
  });

  document.getElementById("taskInput").value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed,
    updatedAt:Date.now()
  });
};

window.toggleFocusManual = async function(task){

  const manualCount = state.tasks.filter(t=>
    t.isFocusManual && !t.completed
  ).length;

  if(!task.isFocusManual && manualCount >= 3){
    alert("最多只能 3 個手動焦點");
    return;
  }

  await updateDoc(doc(db,"tasks",task.id),{
    isFocusManual:!task.isFocusManual,
    updatedAt:Date.now()
  });
};

window.updateNextStep = async function(id,value){
  await updateDoc(doc(db,"tasks",id),{
    nextStep:value,
    updatedAt:Date.now()
  });
};

/* =============================
   InBox Operations
============================= */

window.addInbox = async function(){
  const content = document.getElementById("inboxInput").value.trim();
  if(!content) return;

  await addDoc(collection(db,"inbox"),{
    content,
    createdAt:Date.now()
  });

  document.getElementById("inboxInput").value="";
};

window.convertInbox = async function(item){

  await addDoc(collection(db,"tasks"),{
    title:item.content,
    category:"未分類",
    priority:"中",
    completed:false,
    nextStep:"",
    isFocusManual:false,
    createdAt:Date.now(),
    updatedAt:null
  });

  await deleteDoc(doc(db,"inbox",item.id));
};

window.deleteInbox = async function(id){
  await deleteDoc(doc(db,"inbox",id));
};

/* =============================
   Derived Focus (核心)
============================= */

function getFocusTasks(){

  const manual = state.tasks.filter(t=>
    !t.completed && t.isFocusManual
  );

  const auto = state.tasks
    .filter(t=>
      !t.completed && !t.isFocusManual
    )
    .sort((a,b)=>{
      if(PRIORITY_WEIGHT[a.priority] !== PRIORITY_WEIGHT[b.priority]){
        return PRIORITY_WEIGHT[b.priority] - PRIORITY_WEIGHT[a.priority];
      }
      return (a.createdAt||0)-(b.createdAt||0);
    });

  return [
    ...manual,
    ...auto.slice(0,3-manual.length)
  ].slice(0,3);
}

/* =============================
   Render
============================= */

function renderFocus(){
  const container = document.getElementById("focusContainer");
  container.innerHTML="";

  const focusTasks = getFocusTasks();

  if(focusTasks.length===0){
    container.innerHTML="<div class='focus-empty'>今日無焦點任務</div>";
    return;
  }

  focusTasks.forEach(task=>{
    container.innerHTML+=`
      <div class="focus-card">⭐ ${task.title}</div>
    `;
  });
}

function renderInbox(){
  const container = document.getElementById("inboxContainer");
  container.innerHTML="";

  if(state.inbox.length===0){
    container.innerHTML="<div class='inbox-empty'>目前沒有靈感</div>";
    return;
  }

  state.inbox
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0))
    .forEach(item=>{
      container.innerHTML+=`
        <div class="inbox-card">
          <span>${item.content}</span>
          <div>
            <button onclick='convertInbox(${JSON.stringify(item)})'>✅</button>
            <button onclick='deleteInbox("${item.id}")'>🗑</button>
          </div>
        </div>
      `;
    });
}

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  state.tasks
    .sort((a,b)=>{
      if(a.completed!==b.completed) return a.completed-b.completed;
      return (a.createdAt||0)-(b.createdAt||0);
    })
    .forEach(task=>{

      const isStalled = !task.completed &&
        (Date.now() - (task.updatedAt||task.createdAt||0))
        > STAGNANT_DAYS*24*60*60*1000;

      container.innerHTML+=`
        <div class="task-card">
          <div>
            <input type="checkbox"
              ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>

            ${task.title}

            <span onclick='toggleFocusManual(${JSON.stringify(task)})'
              class="focus-btn">
              ${task.isFocusManual?"⭐":"☆"}
            </span>
          </div>

          <div class="next-step">
            下一步：
            <input value="${task.nextStep||""}"
              onblur="updateNextStep('${task.id}',this.value)">
          </div>

          ${isStalled?"<div class='stalled'>建議補上下一步</div>":""}
        </div>
      `;
    });
}

function renderAll(){
  renderFocus();
  renderInbox();
  renderTasks();
}

/* =============================
   Init
============================= */

loadTasks();
loadInbox();

</script>

<style>
body{
  font-family:Arial;
  background:#f6f7f9;
  padding:20px;
}

.motto{
  text-align:center;
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.focus-section{
  background:#e0f2fe;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

.focus-card{
  background:white;
  padding:8px;
  border-radius:8px;
  margin:5px 0;
}

.inbox-section{
  background:#f3f4f6;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

.inbox-card{
  background:white;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.inbox-empty{
  color:#888;
  font-size:12px;
}

.task-card{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
}

.next-step input{
  width:100%;
  border:1px solid #ddd;
  border-radius:6px;
}

.stalled{
  color:#d97706;
  font-size:12px;
  margin-top:4px;
}

.focus-btn{
  cursor:pointer;
  margin-left:6px;
}
</style>
</head>

<body>

<div class="motto">細節成就卓越</div>

<div class="focus-section">
  <h4>今日焦點</h4>
  <div id="focusContainer"></div>
</div>

<div class="inbox-section">
  <h4>InBox（快速捕捉）</h4>
  <input id="inboxInput"
    placeholder="快速記錄靈感..."
    onkeypress="if(event.key==='Enter') addInbox()">
  <div id="inboxContainer"></div>
</div>

<div>
  <input id="taskInput"
    placeholder="新增任務..."
    onkeypress="if(event.key==='Enter') addTask()">

  <select id="prioritySelect">
    <option value="高">高</option>
    <option value="中" selected>中</option>
    <option value="低">低</option>
  </select>
</div>

<div id="tasksContainer"></div>

</body>
</html>
