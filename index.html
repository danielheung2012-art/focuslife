<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v18.5.1</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ===============================
   Firebase Config
================================ */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===============================
   State
================================ */

const state = {
  tasks: [],
  inbox: [],
  categories: [],
  currentCategory: "全部",
  selectedDate: null,
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear()
};

const PRIORITY_WEIGHT = { 高:3, 中:2, 低:1 };
const STAGNANT_DAYS = 3;

/* ===============================
   Init
================================ */

window.onload = function(){
  renderCalendar();     // ✅ 立即顯示月曆
  loadTasks();
  loadInbox();
  loadCategories();
};

/* ===============================
   Load Firestore
================================ */

function loadTasks(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderFocus();
    renderTasks();
    renderCalendar();   // ✅ 更新任務標記
  });
}

function loadInbox(){
  onSnapshot(collection(db,"inbox"), snap=>{
    state.inbox = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderInbox();
  });
}

function loadCategories(){
  onSnapshot(collection(db,"categories"), snap=>{
    state.categories = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderCategorySelect();
  });
}

/* ===============================
   Derived Focus
================================ */

function getFocusTasks(){
  const manual = state.tasks.filter(t=>!t.completed && t.isFocusManual);
  const auto = state.tasks
    .filter(t=>!t.completed && !t.isFocusManual)
    .sort((a,b)=>{
      if(PRIORITY_WEIGHT[a.priority]!==PRIORITY_WEIGHT[b.priority]){
        return PRIORITY_WEIGHT[b.priority]-PRIORITY_WEIGHT[a.priority];
      }
      return (a.createdAt||0)-(b.createdAt||0);
    });
  return [...manual, ...auto.slice(0,3-manual.length)].slice(0,3);
}

/* ===============================
   Task Operations
================================ */

window.addTask = async function(){
  const title = document.getElementById("taskInput").value.trim();
  if(!title) return;

  const priority = document.getElementById("prioritySelect").value;
  const category = document.getElementById("categorySelect").value;

  await addDoc(collection(db,"tasks"),{
    title,
    category,
    priority,
    completed:false,
    nextStep:"",
    isFocusManual:false,
    dueDate: state.selectedDate || null,
    createdAt:Date.now(),
    updatedAt:null
  });

  document.getElementById("taskInput").value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed,
    updatedAt:Date.now()
  });
};

window.toggleFocusManual = async function(task){
  const manualCount = state.tasks.filter(t=>t.isFocusManual && !t.completed).length;
  if(!task.isFocusManual && manualCount>=3) return;

  await updateDoc(doc(db,"tasks",task.id),{
    isFocusManual:!task.isFocusManual,
    updatedAt:Date.now()
  });
};

/* ===============================
   Inbox
================================ */

window.addInbox = async function(){
  const input=document.getElementById("inboxInput");
  const content=input.value.trim();
  if(!content) return;

  await addDoc(collection(db,"inbox"),{
    content,
    createdAt:Date.now()
  });

  input.value="";
};

window.convertInbox = async function(item){
  await addDoc(collection(db,"tasks"),{
    title:item.content,
    category:"未分類",
    priority:"中",
    completed:false,
    nextStep:"",
    isFocusManual:false,
    dueDate:null,
    createdAt:Date.now(),
    updatedAt:null
  });
  await deleteDoc(doc(db,"inbox",item.id));
};

window.deleteInbox = async function(id){
  await deleteDoc(doc(db,"inbox",id));
};

/* ===============================
   Categories
================================ */

function renderCategorySelect(){
  const select=document.getElementById("categorySelect");
  select.innerHTML=`<option>全部</option><option>未分類</option>`;
  state.categories.forEach(cat=>{
    select.innerHTML+=`<option>${cat.name}</option>`;
  });
}

window.changeCategory=function(){
  state.currentCategory=document.getElementById("categorySelect").value;
  renderTasks();
};

/* ===============================
   Calendar
================================ */

function renderCalendar(){

  const container=document.getElementById("calendarContainer");
  container.innerHTML="";

  document.getElementById("monthLabel").innerText =
    `${state.currentYear} / ${state.currentMonth+1}`;

  const firstDay=new Date(state.currentYear,state.currentMonth,1).getDay();
  const daysInMonth=new Date(state.currentYear,state.currentMonth+1,0).getDate();

  const todayStr=new Date().toISOString().split("T")[0];

  for(let i=0;i<firstDay;i++){
    container.innerHTML+=`<div class="calendar-cell empty"></div>`;
  }

  for(let d=1; d<=daysInMonth; d++){
    const dateStr=`${state.currentYear}-${String(state.currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const taskCount=state.tasks.filter(t=>t.dueDate===dateStr).length;
    const isToday=dateStr===todayStr;
    const isSelected=state.selectedDate===dateStr;

    container.innerHTML+=`
      <div class="calendar-cell
        ${taskCount>0?"has-task":""}
        ${isToday?"today":""}
        ${isSelected?"selected":""}"
        onclick="selectDate('${dateStr}')">
        <div class="date-number">${d}</div>
        ${taskCount>0?`<div class="task-count">${taskCount}</div>`:""}
      </div>
    `;
  }
}

window.selectDate=function(dateStr){
  state.selectedDate=dateStr;
  renderTasks();
  renderCalendar();
};

window.prevMonth=function(){
  state.currentMonth--;
  if(state.currentMonth<0){
    state.currentMonth=11;
    state.currentYear--;
  }
  renderCalendar();
};

window.nextMonth=function(){
  state.currentMonth++;
  if(state.currentMonth>11){
    state.currentMonth=0;
    state.currentYear++;
  }
  renderCalendar();
};

/* ===============================
   Render
================================ */

function renderFocus(){
  const container=document.getElementById("focusContainer");
  container.innerHTML="";
  const focus=getFocusTasks();
  if(focus.length===0){
    container.innerHTML="<div class='empty'>今日沒有焦點</div>";
    return;
  }
  focus.forEach(t=>{
    container.innerHTML+=`<div class="focus-item">${t.title}</div>`;
  });
}

function renderInbox(){
  const container=document.getElementById("inboxContainer");
  container.innerHTML="";
  state.inbox.forEach(item=>{
    container.innerHTML+=`
      <div class="inbox-item">
        ${item.content}
        <div>
          <button onclick='convertInbox(${JSON.stringify(item)})'>加入</button>
          <button onclick='deleteInbox("${item.id}")'>刪除</button>
        </div>
      </div>
    `;
  });
}

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  let tasks=state.tasks;

  if(state.currentCategory!=="全部"){
    tasks=tasks.filter(t=>t.category===state.currentCategory);
  }

  if(state.selectedDate){
    tasks=tasks.filter(t=>t.dueDate===state.selectedDate);
  }

  tasks.forEach(task=>{
    container.innerHTML+=`
      <div class="task-item">
        <input type="checkbox"
          ${task.completed?"checked":""}
          onchange='toggleTask(${JSON.stringify(task)})'>
        ${task.title}
        <span onclick='toggleFocusManual(${JSON.stringify(task)})'>
          ${task.isFocusManual?"★":"☆"}
        </span>
      </div>
    `;
  });
}
</script>

<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
max-width:900px;margin:auto;padding:30px;background:#fafafa;}

.section{margin-bottom:40px;}

.focus-item,.task-item,.inbox-item{
background:white;border:1px solid #eee;border-radius:8px;
padding:10px;margin-bottom:8px;}

.calendar-header{display:flex;justify-content:space-between;margin-bottom:10px;}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}

.calendar-cell{
background:white;border:1px solid #eee;border-radius:8px;
padding:10px;position:relative;cursor:pointer;}

.calendar-cell.today{border:2px solid #2563eb;}
.calendar-cell.selected{background:#e0f2ff;}
.calendar-cell.has-task{background:#f0f9ff;}
.calendar-cell.empty{background:transparent;border:none;}

.date-number{font-size:14px;}

.task-count{
position:absolute;bottom:4px;right:6px;
background:#2563eb;color:white;
font-size:11px;padding:2px 6px;border-radius:12px;}

.empty{color:#aaa;}
</style>
</head>

<body>

<div class="section">
<h3>今日焦點</h3>
<div id="focusContainer"></div>
</div>

<div class="section">
<h3>分類</h3>
<select id="categorySelect" onchange="changeCategory()"></select>
</div>

<div class="section">
<h3>月曆</h3>
<div class="calendar-header">
<button onclick="prevMonth()">‹</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">›</button>
</div>
<div id="calendarContainer" class="calendar"></div>
</div>

<div class="section">
<h3>InBox</h3>
<input id="inboxInput" placeholder="快速記錄..."
onkeypress="if(event.key==='Enter') addInbox()">
<div id="inboxContainer"></div>
</div>

<div class="section">
<h3>新增任務</h3>
<input id="taskInput" placeholder="任務內容..."
onkeypress="if(event.key==='Enter') addTask()">
<select id="prioritySelect">
<option value="高">高</option>
<option value="中" selected>中</option>
<option value="低">低</option>
</select>
<button onclick="addTask()">新增</button>
</div>

<div class="section">
<h3>任務列表</h3>
<div id="tasksContainer"></div>
</div>

</body>
</html>
