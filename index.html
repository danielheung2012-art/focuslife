<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v13.1</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ---------------- Firebase ---------------- */

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- 全域狀態 ---------------- */

const state = {
  tasks: [],
  habits: []
};

let currentCategory = "全部";
const today = new Date().toISOString().split("T")[0];

/* ---------------- 資料載入 ---------------- */

function loadData(){
  onSnapshot(query(collection(db,"tasks")), snapshot=>{
    state.tasks = snapshot.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });

  onSnapshot(query(collection(db,"habits")), snapshot=>{
    state.habits = snapshot.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  });
}

/* ---------------- 渲染入口 ---------------- */

function renderAll(){
  renderDashboard();
  renderTasks();
  renderHabits();
  renderCalendar();
}

/* ---------------- Dashboard ---------------- */

function renderDashboard(){
  const todayTasks = state.tasks.filter(t=>!t.completed && t.dueDate===today);
  const overdue = state.tasks.filter(t=>!t.completed && t.dueDate && t.dueDate<today);
  const habitPending = state.habits.filter(h=>h.lastCompletedDate!==today);

  document.getElementById("statTasks").innerText = todayTasks.length;
  document.getElementById("statHabits").innerText = habitPending.length;
  document.getElementById("statOverdue").innerText = overdue.length;

  const focus = state.tasks.filter(t=>!t.completed &&
    (t.dueDate===today || t.priority==="高" || t.pinned));

  const focusContainer = document.getElementById("todayFocus");
  focusContainer.innerHTML = focus.length ?
    focus.map(t=>`<div class="card">${t.title}</div>`).join("") :
    "<div class='empty'>今日沒有焦點任務 🎉</div>";

  const habitContainer = document.getElementById("habitStatus");
  habitContainer.innerHTML = state.habits.map(h=>{
    const done = h.lastCompletedDate===today;
    return `
      <div class="card">
        ${h.title}
        <span>${done?"✅":"⬜"}</span>
        🔥 ${h.streak||0}
      </div>
    `;
  }).join("");
}

/* ---------------- 任務系統 ---------------- */

window.changeCategory = function(cat){
  currentCategory = cat;
  renderTasks();
};

window.addTask = async function(){
  const title = document.getElementById("taskInput").value.trim();
  const note = document.getElementById("taskNote").value.trim();
  const category = document.getElementById("categorySelect").value;

  if(!title) return;

  await addDoc(collection(db,"tasks"),{
    title,
    note,
    category,
    completed:false,
    order: Date.now(),
    created:serverTimestamp()
  });

  document.getElementById("taskInput").value="";
  document.getElementById("taskNote").value="";
};

window.toggleTask = async (id,current)=>
  await updateDoc(doc(db,"tasks",id),{completed:!current});

window.deleteTask = async (id)=>
  await deleteDoc(doc(db,"tasks",id));

window.saveNote = async function(id){
  const value = document.getElementById("note-input-"+id).value;
  await updateDoc(doc(db,"tasks",id),{note:value});
};

window.toggleNote=function(id){
  const el=document.getElementById("note-"+id);
  el.style.display = el.style.display==="block"?"none":"block";
};

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  const tasks = state.tasks
    .filter(t => currentCategory==="全部" || t.category===currentCategory)
    .sort((a,b)=>(a.order||0)-(b.order||0));

  tasks.forEach(task=>{
    container.innerHTML+=`
      <div class="card" data-id="${task.id}">
        <div class="task-row">
          <div>
            <input type="checkbox" ${task.completed?"checked":""}
              onchange="toggleTask('${task.id}',${task.completed})">
            ${task.title}
          </div>
          <div>
            <button onclick="toggleNote('${task.id}')">📝</button>
            <button onclick="deleteTask('${task.id}')">❌</button>
          </div>
        </div>

        <div id="note-${task.id}" class="note">
          <textarea id="note-input-${task.id}" class="note-input">${task.note||""}</textarea>
          <button onclick="saveNote('${task.id}')">💾 儲存</button>
        </div>
      </div>
    `;
  });

  new Sortable(container,{
    animation:150,
    onEnd: async function(){
      const items = container.children;
      for(let i=0;i<items.length;i++){
        const id = items[i].dataset.id;
        await updateDoc(doc(db,"tasks",id),{order:i});
      }
    }
  });
}

/* ---------------- 習慣系統 ---------------- */

window.addHabit = async function(){
  const title=document.getElementById("habitInput").value.trim();
  if(!title) return;

  await addDoc(collection(db,"habits"),{
    title,
    streak:0,
    lastCompletedDate:null,
    createdAt:serverTimestamp()
  });

  document.getElementById("habitInput").value="";
};

window.completeHabit = async function(habit){
  if(habit.lastCompletedDate===today) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.toISOString().split("T")[0];

  let newStreak = (habit.lastCompletedDate===yStr) ?
    (habit.streak||0)+1 : 1;

  await updateDoc(doc(db,"habits",habit.id),{
    streak:newStreak,
    lastCompletedDate:today
  });
};

function renderHabits(){
  const container=document.getElementById("habitContainer");
  container.innerHTML="";

  state.habits.forEach(h=>{
    container.innerHTML+=`
      <div class="card">
        ${h.title}
        🔥 ${h.streak||0}
        <button onclick='completeHabit(${JSON.stringify(h)})'>✅</button>
      </div>
    `;
  });
}

/* ---------------- 月曆 ---------------- */

function renderCalendar(){
  const calendar=document.getElementById("calendarContainer");
  calendar.innerHTML="";

  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++) calendar.innerHTML+="<div></div>";

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const hasTask=state.tasks.some(t=>t.dueDate===dateStr);
    calendar.innerHTML+=`
      <div class="calendar-day">
        ${d}
        ${hasTask?"<div class='dot'></div>":""}
      </div>
    `;
  }
}

/* ---------------- 切換頁面 ---------------- */

window.switchPage=function(page){
  ["dashboard","tasks","habits","calendar"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(page).style.display="block";
};

loadData();
</script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;margin-bottom:60px;}
h1{margin-bottom:5px;}
.subtitle{color:#666;margin-bottom:20px;}

.stats{display:flex;gap:10px;margin-bottom:20px;}
.stat-card{
  flex:1;background:white;padding:15px;border-radius:14px;
  text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card{
  background:white;padding:12px;margin:8px 0;
  border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,0.04);
}

.task-row{display:flex;justify-content:space-between;align-items:center;}

.note{display:none;margin-top:8px;}
.note-input{width:100%;min-height:60px;}

.empty{color:#888;font-size:14px;}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.calendar-day{
  background:white;padding:10px;text-align:center;
  border-radius:8px;position:relative;
}
.dot{
  width:6px;height:6px;background:#2563eb;
  border-radius:50%;position:absolute;
  bottom:4px;left:50%;transform:translateX(-50%);
}

.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:white;padding:10px;
  display:flex;justify-content:space-around;
  border-top:1px solid #ddd;
}
button{cursor:pointer;}
</style>
</head>

<body>

<div id="dashboard">
  <h1>🌿 FocusLife</h1>
  <div class="subtitle">細節成就卓越</div>

  <div class="stats">
    <div class="stat-card">
      🎯 今日任務<br><strong id="statTasks">0</strong>
    </div>
    <div class="stat-card">
      🔥 今日習慣<br><strong id="statHabits">0</strong>
    </div>
    <div class="stat-card">
      ⚠️ 過期任務<br><strong id="statOverdue">0</strong>
    </div>
  </div>

  <h3>🎯 今日焦點</h3>
  <div id="todayFocus"></div>

  <h3>🔥 今日習慣</h3>
  <div id="habitStatus"></div>
</div>

<div id="tasks" style="display:none;">
  <h2>📝 任務</h2>

  <div style="margin-bottom:10px;">
    <button onclick="changeCategory('全部')">全部</button>
    <button onclick="changeCategory('工作')">工作</button>
    <button onclick="changeCategory('學習')">學習</button>
    <button onclick="changeCategory('運動')">運動</button>
    <button onclick="changeCategory('生活')">生活</button>
    <button onclick="changeCategory('嗜好小組')">嗜好小組</button>
  </div>

  <input id="taskInput" placeholder="任務名稱">
  <input id="taskNote" placeholder="備註">
  <select id="categorySelect">
    <option>工作</option>
    <option>學習</option>
    <option>運動</option>
    <option>生活</option>
    <option>嗜好小組</option>
  </select>
  <button onclick="addTask()">新增</button>

  <div id="tasksContainer"></div>
</div>

<div id="habits" style="display:none;">
  <h2>🔥 習慣</h2>
  <input id="habitInput" placeholder="習慣名稱">
  <button onclick="addHabit()">新增</button>
  <div id="habitContainer"></div>
</div>

<div id="calendar" style="display:none;">
  <h2>📅 月曆</h2>
  <div class="calendar" id="calendarContainer"></div>
</div>

<div class="nav">
  <span onclick="switchPage('dashboard')">🏠</span>
  <span onclick="switchPage('tasks')">📝</span>
  <span onclick="switchPage('habits')">🔥</span>
  <span onclick="switchPage('calendar')">📅</span>
</div>

</body>
</html>
