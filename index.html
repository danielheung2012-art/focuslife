<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife Online</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  where,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5",
  storageBucket: "focuslife-app-eeba5.firebasestorage.app",
  messagingSenderId: "158865821183",
  appId: "1:158865821183:web:f30ea26338e4af8d362bca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function todayString() {
  return new Date().toISOString().split("T")[0];
}

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

window.addTask = async function() {
  const title = document.getElementById("taskInput").value.trim();
  const category = document.getElementById("categorySelect").value;
  if (!title) return;

  await addDoc(collection(db, "tasks"), {
    title,
    category,
    completed: false,
    date: todayString(),
    created: serverTimestamp()
  });

  document.getElementById("taskInput").value = "";
};

window.toggleTask = async function(id, current) {
  await updateDoc(doc(db, "tasks", id), {
    completed: !current
  });
};

window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
};

function loadTodayTasks() {
  const q = query(
    collection(db, "tasks"),
    where("date", "==", todayString()),
    orderBy("created")
  );

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    snapshot.forEach((docItem) => {
      const data = docItem.data();
      const li = document.createElement("li");
      li.innerHTML = `
        <input type="checkbox" ${data.completed ? "checked" : ""}
          onchange="toggleTask('${docItem.id}', ${data.completed})">
        <span style="text-decoration:${data.completed ? "line-through" : "none"}">
          ${data.title} (${data.category})
        </span>
        <button onclick="deleteTask('${docItem.id}')">❌</button>
      `;
      list.appendChild(li);
    });
  });
}

let chart;

window.loadWeeklyStats = async function() {
  const selectedCategory = document.getElementById("filterCategory").value;
  const last7Days = getLast7Days();
  const results = [];

  for (let day of last7Days) {
    let q = query(
      collection(db, "tasks"),
      where("date", "==", day),
      where("completed", "==", true)
    );

    if (selectedCategory !== "全部") {
      q = query(
        collection(db, "tasks"),
        where("date", "==", day),
        where("completed", "==", true),
        where("category", "==", selectedCategory)
      );
    }

    const snapshot = await getDocs(q);
    results.push(snapshot.size);
  }

  if (chart) chart.destroy();

  const ctx = document.getElementById("weeklyChart");
  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: last7Days,
      datasets: [{
        label: "完成數量",
        data: results,
        backgroundColor: "#2563eb"
      }]
    }
  });
};

loadTodayTasks();
</script>

<style>
body { font-family: Arial; padding: 20px; background: #f4f6f9; }
input, select, button { padding: 8px; margin: 5px 0; }
button { background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
li { margin: 8px 0; }
canvas { margin-top: 20px; }
</style>
</head>

<body>

<h2>🌿 FocusLife Online</h2>

<h3>新增任務</h3>
<input id="taskInput" placeholder="輸入今日任務">

<select id="categorySelect">
  <option>工作</option>
  <option>學習</option>
  <option>運動</option>
  <option>自我成長</option>
  <option>生活</option>
  <option>其他</option>
</select>

<button onclick="addTask()">新增任務</button>

<ul id="taskList"></ul>

<hr>

<h3>📊 每週統計</h3>

<select id="filterCategory">
  <option>全部</option>
  <option>工作</option>
  <option>學習</option>
  <option>運動</option>
  <option>自我成長</option>
  <option>生活</option>
  <option>其他</option>
</select>

<button onclick="loadWeeklyStats()">查看統計</button>

<canvas id="weeklyChart"></canvas>

</body>
</html>
