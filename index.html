<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife Online</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5",
  storageBucket: "focuslife-app-eeba5.firebasestorage.app",
  messagingSenderId: "158865821183",
  appId: "1:158865821183:web:f30ea26338e4af8d362bca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const categories = ["工作", "學習", "運動", "自我成長", "生活", "嗜好小組", "其他"];

window.addTask = async function() {
  const title = document.getElementById("taskInput").value.trim();
  const category = document.getElementById("categorySelect").value;
  if (!title) return;

  await addDoc(collection(db, "tasks"), {
    title,
    category,
    completed: false,
    created: serverTimestamp()
  });

  document.getElementById("taskInput").value = "";
};

window.toggleTask = async function(id, current) {
  await updateDoc(doc(db, "tasks", id), {
    completed: !current
  });
};

window.deleteTask = async function(id) {
  await deleteDoc(doc(db, "tasks", id));
};

function loadAllTasks() {
  const q = query(collection(db, "tasks"), orderBy("created"));

  onSnapshot(q, (snapshot) => {
    const container = document.getElementById("taskContainer");
    container.innerHTML = "";

    const grouped = {};

    categories.forEach(cat => grouped[cat] = []);

    snapshot.forEach((docItem) => {
      const data = docItem.data();
      if (!grouped[data.category]) {
        grouped[data.category] = [];
      }
      grouped[data.category].push({ id: docItem.id, ...data });
    });

    for (let cat of categories) {
      if (grouped[cat].length === 0) continue;

      const section = document.createElement("div");
      section.innerHTML = `<h3>📂 ${cat}</h3>`;
      
      const ul = document.createElement("ul");

      grouped[cat].forEach(task => {
        const li = document.createElement("li");
        li.innerHTML = `
          <input type="checkbox" ${task.completed ? "checked" : ""}
            onchange="toggleTask('${task.id}', ${task.completed})">
          <span style="text-decoration:${task.completed ? "line-through" : "none"}">
            ${task.title}
          </span>
          <button onclick="deleteTask('${task.id}')">❌</button>
        `;
        ul.appendChild(li);
      });

      section.appendChild(ul);
      container.appendChild(section);
    }
  });
}

loadAllTasks();
</script>

<style>
body { font-family: Arial; padding: 20px; background: #f4f6f9; }
input, select, button { padding: 8px; margin: 5px 0; }
button { background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
li { margin: 6px 0; }
h3 { margin-top: 20px; }
</style>
</head>

<body>

<h2>🌿 FocusLife Online</h2>

<h3>新增任務</h3>
<input id="taskInput" placeholder="輸入任務">

<select id="categorySelect">
  <option>工作</option>
  <option>學習</option>
  <option>運動</option>
  <option>自我成長</option>
  <option>生活</option>
  <option>嗜好小組</option>
  <option>其他</option>
</select>

<button onclick="addTask()">新增任務</button>

<hr>

<h2>📋 任務清單（分類顯示）</h2>
<div id="taskContainer"></div>

</body>
</html>
