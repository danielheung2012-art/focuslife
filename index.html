<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v16</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ---------------- Firebase ---------------- */

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- 香港時間 ---------------- */

function getHKToday(){
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Hong_Kong"});
}
const today = getHKToday();

/* ---------------- State ---------------- */

const state = { tasks: [] };
let currentYear = new Date().toLocaleString("en-US",{timeZone:"Asia/Hong_Kong",year:"numeric"});
let currentMonth = new Date().toLocaleString("en-US",{timeZone:"Asia/Hong_Kong",month:"numeric"})-1;

/* ---------------- Data ---------------- */

function loadData(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTasks();
    renderCalendar();
  });
}

/* ---------------- Task ---------------- */

window.addTask = async function(title, dueDate){
  const input = document.getElementById("taskInput");
  const taskTitle = title || input.value.trim();
  const taskDue = dueDate || document.getElementById("taskDue").value;

  if(!taskTitle) return;

  await addDoc(collection(db,"tasks"),{
    title:taskTitle,
    dueDate:taskDue,
    note:"",
    completed:false,
    order:Date.now(),
    created:serverTimestamp()
  });

  input.value="";
  closeCalendarModal();
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed
  });
};

window.deleteTask = async id=>{
  await deleteDoc(doc(db,"tasks",id));
};

window.saveNote = async function(id){
  const val=document.getElementById("note-"+id).value;
  await updateDoc(doc(db,"tasks",id),{note:val});
};

window.toggleNote=function(id){
  const el=document.getElementById("note-box-"+id);
  el.style.display = el.style.display==="block"?"none":"block";
};

function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  const sorted = state.tasks.sort((a,b)=>{
    if(a.completed!==b.completed) return a.completed-b.completed;
    return (a.order||0)-(b.order||0);
  });

  sorted.forEach(task=>{
    container.innerHTML+=`
      <div class="task-card ${task.completed?"completed":""}" data-id="${task.id}">
        <div class="task-row">
          <div class="task-left">
            <input type="checkbox" ${task.completed?"checked":""}
              onchange='toggleTask(${JSON.stringify(task)})'>
            <span>${task.title}</span>
            ${task.dueDate?`<span class="due">${task.dueDate}</span>`:""}
          </div>
          <div class="task-actions">
            ${task.note?`<button class="icon-btn" onclick="toggleNote('${task.id}')">📝</button>`:""}
            <button class="icon-btn delete" onclick="deleteTask('${task.id}')">✕</button>
          </div>
        </div>

        ${task.note?`
        <div id="note-box-${task.id}" class="note-box">
          <textarea id="note-${task.id}" onchange="saveNote('${task.id}')">${task.note}</textarea>
        </div>`:""}
      </div>
    `;
  });

  new Sortable(container,{
    animation:150,
    onEnd:async function(){
      const items=container.children;
      for(let i=0;i<items.length;i++){
        await updateDoc(doc(db,"tasks",items[i].dataset.id),{order:i});
      }
    }
  });
}

/* ---------------- Calendar ---------------- */

window.changeMonth=function(offset){
  currentMonth+=offset;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  renderCalendar();
};

function renderCalendar(){
  const cal=document.getElementById("calendarContainer");
  const title=document.getElementById("calendarTitle");
  cal.innerHTML="";

  title.innerText=`${currentYear} 年 ${currentMonth+1} 月`;

  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday=dateStr===today;

    cal.innerHTML+=`
      <div class="calendar-day ${isToday?"today":""}"
        onclick="openCalendarModal('${dateStr}')">
        ${d}
      </div>
    `;
  }
}

/* ---------------- Calendar Modal ---------------- */

window.openCalendarModal=function(date){
  document.getElementById("modalDate").innerText=date;
  document.getElementById("calendarModal").style.display="flex";
  document.getElementById("modalInput").focus();
};

window.closeCalendarModal=function(){
  document.getElementById("calendarModal").style.display="none";
};

window.addFromCalendar=function(){
  const title=document.getElementById("modalInput").value.trim();
  const date=document.getElementById("modalDate").innerText;
  addTask(title,date);
  document.getElementById("modalInput").value="";
};

/* ---------------- Init ---------------- */

loadData();
</script>

<style>
body{
  font-family:Arial;
  background:#f6f7f9;
  padding:20px;
  margin-bottom:60px;
}

/* 金句 */
.quote{
  text-align:center;
  font-size:22px;
  font-weight:600;
  margin:40px 0;
  color:#444;
}

/* 任務 */
.task-card{
  background:white;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.task-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.task-left{
  display:flex;
  gap:8px;
  align-items:center;
}

.due{
  font-size:12px;
  color:#777;
  margin-left:8px;
}

.completed{
  text-decoration:line-through;
  color:#aaa;
}

.icon-btn{
  background:none;
  border:none;
  font-size:14px;
  cursor:pointer;
  opacity:0.6;
}

.icon-btn:hover{
  opacity:1;
}

.delete{
  font-size:13px;
}

.note-box{
  margin-top:8px;
}

.note-box textarea{
  width:100%;
  border:none;
  background:#f2f2f2;
  padding:8px;
  border-radius:8px;
  resize:none;
}

/* 月曆 */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.calendar-day{
  background:white;
  padding:12px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.calendar-day:hover{
  background:#e8f0ff;
}

.today{
  background:#2563eb;
  color:white;
}

/* Modal */
.modal{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.3);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:280px;
}

.modal-box input{
  width:100%;
  padding:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="quote">細節成就卓越</div>

<h3>新增任務</h3>
<input id="taskInput" placeholder="任務名稱">
<input type="date" id="taskDue">
<button onclick="addTask()">新增</button>

<div id="tasksContainer"></div>

<h3>📅 月曆</h3>
<button onclick="changeMonth(-1)">‹</button>
<span id="calendarTitle"></span>
<button onclick="changeMonth(1)">›</button>
<div class="calendar" id="calendarContainer"></div>

<div id="calendarModal" class="modal">
  <div class="modal-box">
    <div id="modalDate"></div>
    <input id="modalInput" placeholder="輸入任務">
    <button onclick="addFromCalendar()">新增</button>
    <button onclick="closeCalendarModal()">取消</button>
  </div>
</div>

</body>
</html>
