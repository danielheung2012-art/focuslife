<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v12</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  updateDoc,
  deleteDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMBfNwA0JEISkafYNx73b2y5jUf5_81vc",
  authDomain: "focuslife-app-eeba5.firebaseapp.com",
  projectId: "focuslife-app-eeba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allTasks = [];
let allHabits = [];

const today = new Date().toISOString().split("T")[0];

/* ---------------- 資料載入 ---------------- */

function loadData(){
  onSnapshot(query(collection(db,"tasks")), snapshot=>{
    allTasks=[];
    snapshot.forEach(docItem=>{
      allTasks.push({id:docItem.id,...docItem.data()});
    });
    renderDashboard();
  });

  onSnapshot(query(collection(db,"habits")), snapshot=>{
    allHabits=[];
    snapshot.forEach(docItem=>{
      allHabits.push({id:docItem.id,...docItem.data()});
    });
    renderDashboard();
  });
}

/* ---------------- Dashboard ---------------- */

function renderDashboard(){
  renderStats();
  renderTodayFocus();
  renderHabitStatus();
}

/* ✅ 三卡片 */

function renderStats(){
  const todayTasks = allTasks.filter(t=>t.dueDate===today && !t.completed);
  const overdue = allTasks.filter(t=>t.dueDate && t.dueDate<today && !t.completed);
  const habitPending = allHabits.filter(h=>h.lastCompletedDate!==today);

  document.getElementById("statTasks").innerText = todayTasks.length;
  document.getElementById("statHabits").innerText = habitPending.length;
  document.getElementById("statOverdue").innerText = overdue.length;
}

/* ✅ 今日焦點任務 */

function renderTodayFocus(){
  const container=document.getElementById("todayFocus");
  container.innerHTML="";

  const focusTasks=allTasks.filter(t=>
    !t.completed &&
    (t.dueDate===today || t.priority==="高" || t.pinned)
  );

  focusTasks.forEach(task=>{
    container.innerHTML+=`
      <div class="card">
        ${task.title}
      </div>
    `;
  });

  if(focusTasks.length===0){
    container.innerHTML="<div class='empty'>今日沒有焦點任務 🎉</div>";
  }
}

/* ✅ 今日習慣 */

function renderHabitStatus(){
  const container=document.getElementById("habitStatus");
  container.innerHTML="";

  allHabits.forEach(habit=>{
    const done = habit.lastCompletedDate===today;

    container.innerHTML+=`
      <div class="card">
        ${habit.title}
        <span>${done?"✅":"⬜"}</span>
        🔥 ${habit.streak||0}
      </div>
    `;
  });
}

/* ---------------- 切換頁面 ---------------- */

window.switchPage=function(page){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("tasks").style.display="none";
  document.getElementById("habits").style.display="none";
  document.getElementById("calendar").style.display="none";
  document.getElementById(page).style.display="block";
};

loadData();

</script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}

h1{margin-bottom:10px;}

.stats{
  display:flex;
  gap:10px;
}

.stat-card{
  flex:1;
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-size:18px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.section{margin-top:20px;}

.card{
  background:white;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

.empty{
  color:#888;
  font-size:14px;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:10px;
  display:flex;
  justify-content:space-around;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<!-- Dashboard 首頁 -->
<div id="dashboard">

<h1>🌿 今日儀表板</h1>

<div class="stats">
  <div class="stat-card">
    🎯 今日任務<br>
    <strong id="statTasks">0</strong>
  </div>
  <div class="stat-card">
    🔥 今日習慣<br>
    <strong id="statHabits">0</strong>
  </div>
  <div class="stat-card">
    ⚠️ 過期任務<br>
    <strong id="statOverdue">0</strong>
  </div>
</div>

<div class="section">
  <h3>🎯 今日焦點</h3>
  <div id="todayFocus"></div>
</div>

<div class="section">
  <h3>🔥 今日習慣</h3>
  <div id="habitStatus"></div>
</div>

</div>

<!-- 其他頁面占位 -->
<div id="tasks" style="display:none;"><h2>任務頁面</h2></div>
<div id="habits" style="display:none;"><h2>習慣頁面</h2></div>
<div id="calendar" style="display:none;"><h2>月曆頁面</h2></div>

<div class="nav">
  <span onclick="switchPage('dashboard')">🏠</span>
  <span onclick="switchPage('tasks')">📝</span>
  <span onclick="switchPage('habits')">🔥</span>
  <span onclick="switchPage('calendar')">📅</span>
</div>

</body>
</html>
