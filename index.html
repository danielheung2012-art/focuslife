<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusLife v18.4</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* ==============================
   Firebase Config
============================== */

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ==============================
   Global State
============================== */

const state = {
  tasks: [],
  inbox: [],
  categories: [],
  currentCategory: "全部",
  selectedDate: null,
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear()
};

const PRIORITY_WEIGHT = { 高:3, 中:2, 低:1 };
const STAGNANT_DAYS = 3;

/* ==============================
   Load Data
============================== */

function loadTasks(){
  onSnapshot(collection(db,"tasks"), snap=>{
    state.tasks = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderAll();
  });
}

function loadInbox(){
  onSnapshot(collection(db,"inbox"), snap=>{
    state.inbox = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderInbox();
  });
}

function loadCategories(){
  onSnapshot(collection(db,"categories"), snap=>{
    state.categories = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderCategorySelect();
  });
}

/* ==============================
   Derived Focus (不儲存)
============================== */

function getFocusTasks(){
  const manual = state.tasks.filter(t=>!t.completed && t.isFocusManual);
  const auto = state.tasks
    .filter(t=>!t.completed && !t.isFocusManual)
    .sort((a,b)=>{
      if(PRIORITY_WEIGHT[a.priority] !== PRIORITY_WEIGHT[b.priority]){
        return PRIORITY_WEIGHT[b.priority] - PRIORITY_WEIGHT[a.priority];
      }
      return (a.createdAt||0)-(b.createdAt||0);
    });

  return [...manual, ...auto.slice(0,3-manual.length)].slice(0,3);
}

/* ==============================
   Task Operations
============================== */

window.addTask = async function(dueDate=null){
  const input = document.getElementById("taskInput");
  const title = input.value.trim();
  if(!title) return;

  const priority = document.getElementById("prioritySelect").value;
  const category = document.getElementById("categorySelect").value;

  await addDoc(collection(db,"tasks"),{
    title,
    category,
    priority,
    completed:false,
    nextStep:"",
    isFocusManual:false,
    dueDate: dueDate || state.selectedDate || null,
    createdAt:Date.now(),
    updatedAt:null
  });

  input.value="";
};

window.toggleTask = async function(task){
  await updateDoc(doc(db,"tasks",task.id),{
    completed:!task.completed,
    updatedAt:Date.now()
  });
};

window.toggleFocusManual = async function(task){
  const manualCount = state.tasks.filter(t=>t.isFocusManual && !t.completed).length;
  if(!task.isFocusManual && manualCount >=3) return;

  await updateDoc(doc(db,"tasks",task.id),{
    isFocusManual:!task.isFocusManual,
    updatedAt:Date.now()
  });
};

window.updateNextStep = async function(id,value){
  await updateDoc(doc(db,"tasks",id),{
    nextStep:value,
    updatedAt:Date.now()
  });
};

/* ==============================
   Inbox
============================== */

window.addInbox = async function(){
  const input = document.getElementById("inboxInput");
  const content = input.value.trim();
  if(!content) return;

  await addDoc(collection(db,"inbox"),{
    content,
    createdAt:Date.now()
  });

  input.value="";
};

window.convertInbox = async function(item){
  await addDoc(collection(db,"tasks"),{
    title:item.content,
    category:"未分類",
    priority:"中",
    completed:false,
    nextStep:"",
    isFocusManual:false,
    dueDate:null,
    createdAt:Date.now(),
    updatedAt:null
  });

  await deleteDoc(doc(db,"inbox",item.id));
};

window.deleteInbox = async function(id){
  await deleteDoc(doc(db,"inbox",id));
};

/* ==============================
   Categories
============================== */

window.addCategory = async function(){
  const name = prompt("分類名稱");
  if(!name) return;

  await addDoc(collection(db,"categories"),{
    name,
    createdAt:Date.now()
  });
};

function renderCategorySelect(){
  const select = document.getElementById("categorySelect");
  if(!select) return;

  select.innerHTML = `<option>全部</option><option>未分類</option>`;
  state.categories.forEach(cat=>{
    select.innerHTML += `<option>${cat.name}</option>`;
  });
}

window.changeCategory = function(){
  state.currentCategory = document.getElementById("categorySelect").value;
  renderTasks();
};

/* ==============================
   Calendar (卡片式)
============================== */

function renderCalendar(){

  const container = document.getElementById("calendarContainer");
  container.innerHTML="";

  const firstDay = new Date(state.currentYear,state.currentMonth,1).getDay();
  const daysInMonth = new Date(state.currentYear,state.currentMonth+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    container.innerHTML+=`<div class="calendar-cell empty"></div>`;
  }

  for(let d=1; d<=daysInMonth; d++){

    const dateStr = `${state.currentYear}-${String(state.currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const hasTask = state.tasks.some(t=>t.dueDate===dateStr);

    container.innerHTML+=`
      <div class="calendar-cell ${hasTask?"has-task":""}"
        onclick="selectDate('${dateStr}')">
        ${d}
      </div>
    `;
  }
}

window.selectDate = function(dateStr){
  state.selectedDate = dateStr;
  renderTasks();
};

/* ==============================
   Render
============================== */

function renderFocus(){
  const container = document.getElementById("focusContainer");
  container.innerHTML="";

  const focusTasks = getFocusTasks();
  if(focusTasks.length===0){
    container.innerHTML="<div class='empty'>今日沒有焦點</div>";
    return;
  }

  focusTasks.forEach(task=>{
    container.innerHTML+=`<div class="focus-item">${task.title}</div>`;
  });
}

function renderInbox(){
  const container = document.getElementById("inboxContainer");
  container.innerHTML="";

  state.inbox.forEach(item=>{
    container.innerHTML+=`
      <div class="inbox-item">
        ${item.content}
        <button onclick='convertInbox(${JSON.stringify(item)})'>加入</button>
      </div>
    `;
  });
}

function renderTasks(){
  const container = document.getElementById("tasksContainer");
  container.innerHTML="";

  let tasks = state.tasks;

  if(state.currentCategory !== "全部"){
    tasks = tasks.filter(t=>t.category===state.currentCategory);
  }

  if(state.selectedDate){
    tasks = tasks.filter(t=>t.dueDate===state.selectedDate);
  }

  tasks.forEach(task=>{
    container.innerHTML+=`
      <div class="task-item">
        <input type="checkbox"
          ${task.completed?"checked":""}
          onchange='toggleTask(${JSON.stringify(task)})'>

        ${task.title}

        <span onclick='toggleFocusManual(${JSON.stringify(task)})'>
          ${task.isFocusManual?"★":"☆"}
        </span>
      </div>
    `;
  });
}

function renderAll(){
  renderFocus();
  renderTasks();
  renderCalendar();
}

/* ==============================
   Init
============================== */

loadTasks();
loadInbox();
loadCategories();

</script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  max-width:900px;
  margin:auto;
  padding:30px;
  background:#fafafa;
}

.section{ margin-bottom:40px; }

.focus-item{
  background:white;
  padding:10px;
  border-radius:8px;
  margin-bottom:6px;
  border:1px solid #eee;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-cell{
  background:white;
  padding:10px;
  border-radius:6px;
  text-align:center;
  cursor:pointer;
  border:1px solid #eee;
}

.calendar-cell.has-task{
  background:#e0f2ff;
}

.calendar-cell.empty{
  background:transparent;
  border:none;
}

.task-item{
  background:white;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  border:1px solid #eee;
}

.inbox-item{
  background:white;
  padding:8px;
  border-radius:6px;
  margin-bottom:6px;
  border:1px solid #eee;
}

.empty{ color:#aaa; }
</style>
</head>

<body>

<div class="section">
  <h3>今日焦點</h3>
  <div id="focusContainer"></div>
</div>

<div class="section">
  <h3>分類</h3>
  <select id="categorySelect" onchange="changeCategory()"></select>
  <button onclick="addCategory()">新增分類</button>
</div>

<div class="section">
  <h3>月曆</h3>
  <div id="calendarContainer" class="calendar"></div>
</div>

<div class="section">
  <h3>InBox</h3>
  <input id="inboxInput"
    placeholder="快速記錄..."
    onkeypress="if(event.key==='Enter') addInbox()">
  <div id="inboxContainer"></div>
</div>

<div class="section">
  <h3>新增任務</h3>
  <input id="taskInput"
    placeholder="任務內容..."
    onkeypress="if(event.key==='Enter') addTask()">

  <select id="prioritySelect">
    <option value="高">高</option>
    <option value="中" selected>中</option>
    <option value="低">低</option>
  </select>

  <button onclick="addTask()">新增</button>
</div>

<div class="section">
  <h3>任務列表</h3>
  <div id="tasksContainer"></div>
</div>

</body>
</html>
